name: VAR Impulse Response Function 1.8
inputs:
  - {name: input_data, type: Data, description: "Input time series data (CSV or Parquet with datetime index)"}
  - {name: var_lags, type: Integer, description: "Number of lags for VAR model", default: "10"}
  - {name: irf_periods, type: Integer, description: "Number of periods for impulse response", default: "5"}
  - {name: orthogonalized, type: String, description: "Use orthogonalized IRF (true/false)", default: "true"}
  - {name: confidence_level, type: Float, description: "Confidence level for error bands (0-1)", default: "0.95"}
  - {name: n_bootstrap, type: Integer, description: "Number of bootstrap iterations for confidence intervals (0=disable)", default: "0"}
  - {name: seed, type: Integer, description: "Random seed for reproducibility", default: "42"}

outputs:
  - {name: schema_json, type: String, description: "Schema JSON with recoverycurve (shape + values)"}

implementation:
  container:
    image: gurpreetgandhi/nesy-factory:v1
    command:
      - sh
      - -c
      - |
        PIP_DISABLE_PIP_VERSION_CHECK=1 python3 -m pip install --quiet --no-warn-script-location \
          'statsmodels' \
          'scipy>=1.11.0'
        exec "$0" "$@"
      - python3
      - -u
      - -c
      - |
        import argparse
        import os
        import sys
        import json
        import time
        import logging
        import numpy as np
        import pandas as pd
        from pathlib import Path
        from statsmodels.tsa.api import VAR
        import warnings
        warnings.filterwarnings('ignore')

        logging.basicConfig(stream=sys.stdout, level=logging.INFO)
        logger = logging.getLogger("var_irf")

        parser = argparse.ArgumentParser()
        parser.add_argument("--input_data",        type=str,   required=True)
        parser.add_argument("--var_lags",          type=int,   required=True)
        parser.add_argument("--irf_periods",       type=int,   required=True)
        parser.add_argument("--orthogonalized",    type=str,   required=True)
        parser.add_argument("--confidence_level",  type=float, required=True)
        parser.add_argument("--n_bootstrap",       type=int,   required=True)
        parser.add_argument("--seed",              type=int,   required=True)
        parser.add_argument("--schema_json",       type=str,   required=True)
        args = parser.parse_args()

        def str_to_bool(s):
            return str(s).lower() in ["true", "1", "yes"]

        def ensure_dir_for(p):
            d = os.path.dirname(p)
            if d:
                os.makedirs(d, exist_ok=True)

        try:
            np.random.seed(args.seed)
            use_orth = str_to_bool(args.orthogonalized)

            # ── Load Data ──────────────────────────────────────────────
            logger.info("Loading Input Data")
            data_files = list(Path(args.input_data).glob("*.csv")) + \
                         list(Path(args.input_data).glob("*.parquet"))
            if not data_files:
                raise FileNotFoundError(f"No CSV or Parquet file found in {args.input_data}")

            data_path = data_files[0]
            if data_path.suffix == ".csv":
                data = pd.read_csv(data_path, index_col=0, parse_dates=True)
            else:
                data = pd.read_parquet(data_path)

            logger.info(f"✓ Data loaded: {data.shape}, columns: {list(data.columns)}")

            if data.isnull().any().any():
                data = data.dropna()
                logger.info(f"  After dropping NaN: {data.shape}")

            if len(data) < args.var_lags + args.irf_periods + 10:
                raise ValueError(
                    f"Insufficient data: {len(data)} rows. "
                    f"Need at least {args.var_lags + args.irf_periods + 10} rows."
                )

            # ── Fit VAR ────────────────────────────────────────────────
            logger.info(f"Fitting VAR model (lags={args.var_lags})")
            data_jittered = data + np.random.normal(0, 1e-8, data.shape)
            var_model = VAR(data_jittered)

            try:
                var_results = var_model.fit(maxlags=args.var_lags, ic=None)
            except np.linalg.LinAlgError:
                logger.warning("⚠ Singular matrix — applying stronger regularization")
                data_jittered = data + np.random.normal(0, 1e-6, data.shape)
                var_model = VAR(data_jittered)
                for lags in range(args.var_lags, 0, -1):
                    try:
                        var_results = var_model.fit(maxlags=lags, ic=None)
                        logger.info(f"✓ Success with {lags} lags")
                        break
                    except np.linalg.LinAlgError:
                        continue

            # Regularize covariance matrix
            epsilon = 1e-6
            eye = np.eye(var_results.sigma_u.shape[0])
            var_results.sigma_u     = var_results.sigma_u     + epsilon * eye
            var_results.sigma_u_mle = var_results.sigma_u_mle + epsilon * eye

            for cached_attr in ('_cov_params', '_lag_order_results'):
                try:
                    if cached_attr in vars(var_results):
                        delattr(var_results, cached_attr)
                except (AttributeError, TypeError):
                    pass

            logger.info(f"✓ VAR fitted — AIC: {var_results.aic:.4f}, BIC: {var_results.bic:.4f}")

            # ── Compute IRF ────────────────────────────────────────────
            logger.info(f"Computing IRF (periods={args.irf_periods}, orth={use_orth})")
            irf = var_results.irf(args.irf_periods)

            if args.n_bootstrap > 0:
                irf_boot = irf.errband_mc(
                    orth=use_orth,
                    repl=args.n_bootstrap,
                    signif=1 - args.confidence_level,
                    seed=args.seed,
                )
                logger.info(f"✓ Bootstrap confidence intervals computed")

            irf_values = irf.orth_irfs if use_orth else irf.irfs
            logger.info(f"✓ IRF computed, shape: {irf_values.shape}")

            # ── Save Schema JSON ───────────────────────────────────────
            schema_data = {
                "recoverycurve": {
                    "shape": list(irf_values.shape),
                    "values": irf_values.tolist()
                },
                "timestamp": time.time(),
                "metadata": {
                    "var_lags": args.var_lags,
                    "irf_periods": args.irf_periods,
                    "orthogonalized": use_orth,
                    "n_variables": irf_values.shape[1],
                    "variables": list(data.columns),
                    "aic": float(var_results.aic),
                    "bic": float(var_results.bic),
                }
            }

            ensure_dir_for(args.schema_json)
            with open(args.schema_json, "w") as f:
                json.dump(schema_data, f, indent=4)

            logger.info(f"✓ Schema JSON saved: {args.schema_json}")

        except Exception as e:
            logger.exception(f"Fatal error: {str(e)}")
            sys.exit(1)

    args:
      - --input_data
      - {inputPath: input_data}
      - --var_lags
      - {inputValue: var_lags}
      - --irf_periods
      - {inputValue: irf_periods}
      - --orthogonalized
      - {inputValue: orthogonalized}
      - --confidence_level
      - {inputValue: confidence_level}
      - --n_bootstrap
      - {inputValue: n_bootstrap}
      - --seed
      - {inputValue: seed}
      - --schema_json
      - {outputPath: schema_json}
